<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Lo que pasa mientras duermo</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      color: #333;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    h1 {
      font-size: 2em;
      margin-bottom: 10px;
    }
    .subtitle {
      color: #666;
      font-size: 1.1em;
      margin-bottom: 30px;
      margin-top: 0;
    }
    .visualization {
      margin: 40px 0;
      padding: 30px 0;
      border-top: 1px solid #eee;
    }
    .visualization:first-of-type {
      border-top: none;
      padding-top: 0;
    }
    h2 {
      font-size: 1.3em;
      margin: 0 0 20px 0;
      color: #333;
    }
    .svg-embed {
      width: 100%;
      height: auto;
      display: block;
      border: 1px solid #eee;
      border-radius: 8px;
      background: #fff;
    }
    a.back {
      display: inline-block;
      margin-bottom: 30px;
      color: #0066cc;
      text-decoration: none;
    }
    a.back:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <a href="../" class="back">← Volver</a>
  
  <h1>Lo que pasa mientras duermo</h1>
  <p class="subtitle">Exploración visual de datos personales sobre patrones de sueño</p>
  
  <div class="visualization">
    <h2>¿Dormir más horas garantiza más sueño profundo?</h2>
    <div class="flourish-embed flourish-chart" data-src="visualisation/28159976">
    <script src="https://public.flourish.studio/resources/embed.js"></script>
    <noscript>
        <img src="https://public.flourish.studio/visualisation/28159976/thumbnail" width="100%" alt="visualization" />
    </noscript>
    </div>
  </div>

  <div class="visualization">
    <h2>¿Duermo distinto los fines de semana?</h2>
    <img src="streamgraph.svg" class="svg-embed" alt="Streamgraph de patrones de sueño entre semana y fines de semana">
  </div>
</body>
</html>
